{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}RecipeHub{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'recipes/css/style.css' %}">

    <style>
        html{
            scroll-behavior:smooth;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f8fafc;
            overflow-x:hidden;
            padding-top:80px;
        }

        .navbar{
    background:#5a3926;
    box-shadow:0 2px 15px rgba(0,0,0,.15);
    padding:15px 0;
}

.navbar-brand{
    color:#fff !important;
    font-size:2rem;
    font-weight:700;
}

.navbar-brand:hover{
    color:#ffcc33 !important;
}

.nav-link{
    color:#fff !important;
    font-weight:600;
    margin-left:20px;
    transition:.3s;
}

.nav-link:hover{
    color:#ffcc33 !important;
}
    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">

<div class="container">

<a class="navbar-brand" href="{% url 'home' %}">
🍽️ RecipeHub
</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="{% url 'home' %}">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'recipe_list' %}">Recipes</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'home' %}#categories">
Categories
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'home' %}#about">
About
</a>
</li>

{% if user.is_authenticated %}

<li class="nav-item">
<span class="nav-link">
👋 Hi, {{ user.username }}
</span>
</li>

<li class="nav-item">
<a class="nav-link text-danger"
href="{% url 'logout' %}">
Logout
</a>
</li>

{% else %}

<li class="nav-item">
<a class="nav-link"
href="{% url 'login' %}">
Login
</a>
</li>

<li class="nav-item">
<a class="nav-link"
   href="{% url 'register' %}">
    Register
</a>
Register
</a>
</li>

{% endif %}

</ul>

</div>

</div>

</nav>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({
duration:800,
once:true
});
</script>

</body>
</html>
