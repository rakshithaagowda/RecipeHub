{% extends "base.html" %}
{% load static %}

{% block title %}Login | RecipeHub{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'recipes/css/auth.css' %}">

<div class="container">

    <div class="card auth-card">

        <div class="auth-header">

            <h2>🍽️ RecipeHub</h2>

            <p>Welcome back! Login to continue.</p>

        </div>

        <div class="auth-body">

            <form method="POST">

                {% csrf_token %}

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <div class="mb-3">

                    <label class="form-label">Username</label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter your username"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Password</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required>

                </div>

                <button type="submit" class="btn btn-auth">
                    Login
                </button>

            </form>

            <div class="auth-footer">

                Don't have an account?

                <a href="{% url 'register' %}">
                    Register
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
